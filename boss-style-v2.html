<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Boss Pixel Art v2 — Grand & Menaçant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e8e8f0; font-family: 'Segoe UI', sans-serif; }

  .boss-screen {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .boss-zone {
    flex: 0 0 40vh;
    background: #3d1212;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 0;
    position: relative;
    overflow: hidden;
  }

  /* Ambient particles */
  .boss-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 80%, rgba(255,60,20,0.15) 0%, transparent 60%);
  }

  .boss-name {
    font-size: 1.4rem;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    position: absolute;
    top: 0.75rem;
    z-index: 5;
  }

  .boss-svg-container {
    position: relative;
    z-index: 2;
    animation: bossFloat 3s ease-in-out infinite;
    /* Boss overflows into the VS zone — looming over the player */
    margin-bottom: -30px;
  }

  @keyframes bossFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* The pixel art SVG */
  .boss-pixel {
    width: 280px;
    height: 280px;
    filter: drop-shadow(0 10px 30px rgba(255,50,20,0.4));
  }

  /* Eye glow animation */
  .eye-glow {
    animation: eyePulse 2s ease-in-out infinite;
  }
  @keyframes eyePulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Fire breath animation */
  .fire-breath {
    animation: fireBreath 1.2s ease-in-out infinite alternate;
    transform-origin: top center;
  }
  @keyframes fireBreath {
    0% { transform: scaleY(0.7) scaleX(0.9); opacity: 0.7; }
    100% { transform: scaleY(1.1) scaleX(1.1); opacity: 1; }
  }

  .fire-breath-2 {
    animation: fireBreath2 0.9s ease-in-out infinite alternate;
    transform-origin: top center;
  }
  @keyframes fireBreath2 {
    0% { transform: scaleY(0.8) scaleX(1.1) rotate(-2deg); opacity: 0.6; }
    100% { transform: scaleY(1.15) scaleX(0.85) rotate(2deg); opacity: 0.9; }
  }

  /* Wing flap */
  .wing-l { animation: wingFlapL 2s ease-in-out infinite; transform-origin: right center; }
  .wing-r { animation: wingFlapR 2s ease-in-out infinite; transform-origin: left center; }
  @keyframes wingFlapL {
    0%, 100% { transform: rotate(0deg) scaleY(1); }
    50% { transform: rotate(-8deg) scaleY(0.95); }
  }
  @keyframes wingFlapR {
    0%, 100% { transform: rotate(0deg) scaleY(1); }
    50% { transform: rotate(8deg) scaleY(0.95); }
  }

  /* HP bar */
  .hp-section {
    position: absolute;
    bottom: 0.75rem;
    width: 70%;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    z-index: 5;
  }
  .hp-bar { flex: 1; height: 16px; background: rgba(255,255,255,0.15); border-radius: 8px; overflow: hidden; }
  .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4040, #ff6b6b); border-radius: 8px; width: 100%; }
  .hp-text { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.7); }

  /* VS divider */
  .vs-divider {
    display: flex; align-items: center; gap: 1rem; padding: 0.6rem 2rem;
    position: relative; z-index: 3;
  }
  .vs-line { flex: 1; height: 2px; background: linear-gradient(90deg, transparent, #ff8c42, transparent); }
  .vs-text { font-size: 1.2rem; font-weight: 800; color: #ff8c42; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255,140,66,0.4); }

  /* Player zone */
  .player-zone {
    flex: 1; padding: 0 1.5rem 1rem;
    display: flex; flex-direction: column; justify-content: space-between;
    max-width: 600px; margin: 0 auto; width: 100%;
  }
  .phase-label { text-align: center; font-size: 0.85rem; font-weight: 600; color: #ff8c42; text-transform: uppercase; letter-spacing: 1px; margin: 0.5rem 0; }
  .question-card {
    background: #25253e; border-radius: 12px; padding: 1.5rem;
    border-left: 4px solid #4a9eff; flex: 1; display: flex; flex-direction: column; justify-content: center;
  }
  .question-text { font-size: 1.1rem; font-weight: 600; }
  .player-hp {
    display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0;
    border-top: 1px solid rgba(255,255,255,0.08); margin-top: 0.75rem;
  }
  .player-label { font-size: 0.9rem; font-weight: 700; color: #a0a0b8; }
  .hearts { font-size: 1.5rem; letter-spacing: 4px; }
</style>
</head>
<body>
<div class="boss-screen">

  <div class="boss-zone">
    <span class="boss-name">Dragon des Fractions</span>

    <div class="boss-svg-container">
      <svg class="boss-pixel" viewBox="0 0 32 30" shape-rendering="crispEdges">

        <!-- Wings (behind body) -->
        <g class="wing-l">
          <rect x="1" y="11" width="1" height="1" fill="#a02820"/>
          <rect x="0" y="12" width="1" height="1" fill="#a02820"/>
          <rect x="0" y="13" width="2" height="1" fill="#c83028"/>
          <rect x="1" y="14" width="2" height="1" fill="#c83028"/>
          <rect x="2" y="15" width="2" height="1" fill="#c83028"/>
          <rect x="3" y="16" width="2" height="1" fill="#a02820"/>
          <rect x="0" y="11" width="1" height="1" fill="#801818"/>
          <rect x="0" y="10" width="1" height="2" fill="#801818"/>
          <rect x="1" y="10" width="1" height="1" fill="#a02820"/>
          <rect x="2" y="11" width="1" height="1" fill="#c83028"/>
          <rect x="2" y="12" width="2" height="1" fill="#c83028"/>
          <rect x="3" y="13" width="2" height="1" fill="#c83028"/>
          <rect x="4" y="14" width="2" height="1" fill="#c83028"/>
        </g>
        <g class="wing-r">
          <rect x="30" y="11" width="1" height="1" fill="#a02820"/>
          <rect x="31" y="12" width="1" height="1" fill="#a02820"/>
          <rect x="30" y="13" width="2" height="1" fill="#c83028"/>
          <rect x="29" y="14" width="2" height="1" fill="#c83028"/>
          <rect x="28" y="15" width="2" height="1" fill="#c83028"/>
          <rect x="27" y="16" width="2" height="1" fill="#a02820"/>
          <rect x="31" y="11" width="1" height="1" fill="#801818"/>
          <rect x="31" y="10" width="1" height="2" fill="#801818"/>
          <rect x="30" y="10" width="1" height="1" fill="#a02820"/>
          <rect x="29" y="11" width="1" height="1" fill="#c83028"/>
          <rect x="27" y="12" width="3" height="1" fill="#c83028"/>
          <rect x="26" y="13" width="3" height="1" fill="#c83028"/>
          <rect x="25" y="14" width="3" height="1" fill="#c83028"/>
        </g>

        <!-- Horns -->
        <rect x="8" y="0" width="2" height="1" fill="#f0a050"/>
        <rect x="9" y="1" width="2" height="1" fill="#f0a050"/>
        <rect x="10" y="2" width="1" height="1" fill="#f0a050"/>
        <rect x="22" y="0" width="2" height="1" fill="#f0a050"/>
        <rect x="21" y="1" width="2" height="1" fill="#f0a050"/>
        <rect x="21" y="2" width="1" height="1" fill="#f0a050"/>

        <!-- Head top -->
        <rect x="11" y="2" width="10" height="1" fill="#e04030"/>
        <rect x="10" y="3" width="12" height="1" fill="#e04030"/>

        <!-- Spikes -->
        <rect x="13" y="1" width="1" height="1" fill="#f0a050"/>
        <rect x="16" y="0" width="1" height="1" fill="#f0a050"/>
        <rect x="16" y="1" width="1" height="1" fill="#f0a050"/>
        <rect x="19" y="1" width="1" height="1" fill="#f0a050"/>

        <!-- Head sides -->
        <rect x="9" y="4" width="14" height="1" fill="#e04030"/>
        <rect x="8" y="5" width="16" height="1" fill="#e04030"/>
        <rect x="8" y="6" width="16" height="1" fill="#e04030"/>

        <!-- Eyes row — BIG menacing eyes looking DOWN -->
        <rect x="10" y="5" width="3" height="2" fill="#ffff80"/><!-- left eye bg -->
        <rect x="19" y="5" width="3" height="2" fill="#ffff80"/><!-- right eye bg -->
        <rect x="11" y="6" width="2" height="1" fill="#1a0505"/><!-- left pupil DOWN -->
        <rect x="20" y="6" width="2" height="1" fill="#1a0505"/><!-- right pupil DOWN -->
        <!-- Eye glow -->
        <rect class="eye-glow" x="10" y="5" width="3" height="2" fill="#ff4020" opacity="0.3"/>
        <rect class="eye-glow" x="19" y="5" width="3" height="2" fill="#ff4020" opacity="0.3"/>

        <!-- Snout -->
        <rect x="9" y="7" width="14" height="1" fill="#e04030"/>
        <rect x="10" y="8" width="12" height="1" fill="#e04030"/>
        <!-- Nostrils -->
        <rect x="12" y="7" width="1" height="1" fill="#8b1a1a"/>
        <rect x="19" y="7" width="1" height="1" fill="#8b1a1a"/>

        <!-- Mouth — open, showing teeth, looking down at player -->
        <rect x="10" y="9" width="12" height="1" fill="#8b1a1a"/>
        <rect x="11" y="10" width="10" height="1" fill="#500a0a"/>
        <!-- Top teeth -->
        <rect x="12" y="9" width="1" height="1" fill="#f0e8d0"/>
        <rect x="14" y="9" width="1" height="1" fill="#f0e8d0"/>
        <rect x="17" y="9" width="1" height="1" fill="#f0e8d0"/>
        <rect x="19" y="9" width="1" height="1" fill="#f0e8d0"/>
        <!-- Bottom teeth -->
        <rect x="13" y="10" width="1" height="1" fill="#f0e8d0"/>
        <rect x="16" y="10" width="1" height="1" fill="#f0e8d0"/>
        <rect x="18" y="10" width="1" height="1" fill="#f0e8d0"/>

        <!-- Neck -->
        <rect x="11" y="11" width="10" height="1" fill="#e04030"/>
        <rect x="10" y="12" width="12" height="1" fill="#e04030"/>

        <!-- Body -->
        <rect x="8" y="13" width="16" height="1" fill="#e04030"/>
        <rect x="7" y="14" width="18" height="1" fill="#e04030"/>
        <rect x="7" y="15" width="18" height="1" fill="#e04030"/>
        <rect x="7" y="16" width="18" height="1" fill="#e04030"/>
        <rect x="8" y="17" width="16" height="1" fill="#e04030"/>
        <rect x="9" y="18" width="14" height="1" fill="#e04030"/>

        <!-- Belly -->
        <rect x="11" y="13" width="10" height="1" fill="#f0a050"/>
        <rect x="10" y="14" width="12" height="1" fill="#f0a050"/>
        <rect x="10" y="15" width="12" height="1" fill="#f0a050"/>
        <rect x="10" y="16" width="12" height="1" fill="#f0a050"/>
        <rect x="11" y="17" width="10" height="1" fill="#f0a050"/>
        <!-- Belly lines -->
        <rect x="12" y="14" width="8" height="0.3" fill="#e08830"/>
        <rect x="11" y="15" width="10" height="0.3" fill="#e08830"/>
        <rect x="12" y="16" width="8" height="0.3" fill="#e08830"/>

        <!-- Arms/claws reaching down -->
        <rect x="6" y="15" width="1" height="2" fill="#c83028"/>
        <rect x="5" y="17" width="1" height="1" fill="#c83028"/>
        <rect x="5" y="18" width="1" height="1" fill="#f0a050"/>
        <rect x="25" y="15" width="1" height="2" fill="#c83028"/>
        <rect x="26" y="17" width="1" height="1" fill="#c83028"/>
        <rect x="26" y="18" width="1" height="1" fill="#f0a050"/>

        <!-- Legs -->
        <rect x="9" y="19" width="3" height="1" fill="#c83028"/>
        <rect x="20" y="19" width="3" height="1" fill="#c83028"/>
        <rect x="8" y="20" width="3" height="1" fill="#c83028"/>
        <rect x="21" y="20" width="3" height="1" fill="#c83028"/>
        <rect x="8" y="21" width="1" height="1" fill="#f0a050"/>
        <rect x="9" y="21" width="1" height="1" fill="#f0a050"/>
        <rect x="22" y="21" width="1" height="1" fill="#f0a050"/>
        <rect x="23" y="21" width="1" height="1" fill="#f0a050"/>

        <!-- Tail -->
        <rect x="24" y="17" width="1" height="1" fill="#e04030"/>
        <rect x="25" y="16" width="1" height="1" fill="#e04030"/>
        <rect x="26" y="15" width="1" height="1" fill="#e04030"/>
        <rect x="27" y="14" width="1" height="1" fill="#e04030"/>
        <rect x="28" y="13" width="1" height="1" fill="#e04030"/>
        <rect x="29" y="13" width="1" height="1" fill="#f0a050"/>

        <!-- Fire breath going DOWN toward the player -->
        <g class="fire-breath">
          <rect x="13" y="11" width="2" height="1" fill="#ff8020" opacity="0.8"/>
          <rect x="17" y="11" width="2" height="1" fill="#ff6010" opacity="0.7"/>
          <rect x="14" y="12" width="1" height="1" fill="#ff4000" opacity="0.5"/>
          <rect x="17" y="12" width="1" height="1" fill="#ff4000" opacity="0.4"/>
        </g>
        <g class="fire-breath-2">
          <rect x="12" y="11" width="1" height="1" fill="#ff6010" opacity="0.5"/>
          <rect x="19" y="11" width="1" height="1" fill="#ff6010" opacity="0.4"/>
          <rect x="15" y="12" width="2" height="1" fill="#ff2000" opacity="0.3"/>
        </g>

      </svg>
    </div>

    <div class="hp-section">
      <div class="hp-bar"><div class="hp-fill" style="width:83%"></div></div>
      <span class="hp-text">5/6</span>
    </div>
  </div>

  <div class="vs-divider">
    <span class="vs-line"></span>
    <span class="vs-text">&#9876; VS</span>
    <span class="vs-line"></span>
  </div>

  <div class="player-zone">
    <div class="phase-label">Phase 1 — Assaut (2/3)</div>
    <div class="question-card">
      <p class="question-text">Un gâteau est partagé en 8 parts. Liam mange 3 parts, Noé mange 2 parts. Combien de parts reste-t-il ?</p>
    </div>
    <div class="player-hp">
      <span class="player-label">Toi</span>
      <span class="hearts">&#10084;&#65039;&#10084;&#65039;&#128420;</span>
      <div class="hp-bar" style="flex:1;height:10px"><div class="hp-fill" style="width:66%;background:linear-gradient(90deg,#4ecdc4,#44b09e)"></div></div>
      <span class="hp-text" style="font-size:0.75rem">2/3</span>
    </div>
  </div>

</div>
</body>
</html>
